[env:lilygo-t-display-s3]
platform = espressif32
board = lilygo-t-display-s3
framework = arduino

; 시리얼 모니터 및 업로드 속도
monitor_speed = 115200
upload_speed = 921600

build_flags = 
    ; USB 시리얼 활성화 (디버깅용)
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    ; UI 전용 저발열 기본 클럭(MHz)
    -DUI_CPU_MHZ=80
    ; 기본값: WiFi/ESP-NOW 수신 활성. CAN 전용 저발열 운용 시 0으로 전환.
    -DENABLE_WIFI_RADIO=1
    ; PSRAM 활성화 (S3 모델 필수)
    -DBOARD_HAS_PSRAM
    ; 그래픽 라이브러리 설정 (TFT_eSPI 사용 시)
    -DUSER_SETUP_LOADED=1
    -include $PROJECT_LIBDEPS_DIR/$PIOENV/TFT_eSPI/User_Setups/Setup206_LilyGo_T_Display_S3.h

; CAN 전용 저발열 프로파일 예시 (선택):
; 1) 아래 플래그를 켜고
; 2) main.cpp에서 TWAI 수신 루프를 사용하도록 구성하면
;    WiFi/BT 스택을 사용하지 않아 발열/전력 감소에 유리합니다.
; build_flags =
;     ${env:lilygo-t-display-s3.build_flags}
;     -DENABLE_WIFI_RADIO=0
;     -DCONFIG_BT_ENABLED=0
;     -DCONFIG_BLUEDROID_ENABLED=0

lib_deps = 
    bodmer/TFT_eSPI @ ^2.5.31
    